<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>دعوة تفاعلية</title>

  <style>
    @font-face {
      font-family: 'Noor';
      src: url('Noor.ttf');
    }

    body {
      margin: 0;
      font-family: 'Noor', sans-serif;
      background: #0b0b0b;
      text-align: center;
    }

    .container {
      max-width: 500px;
      margin: auto;
      padding: 20px;
    }

    h2 {
      color: #9e9157;
      margin-bottom: 10px;
    }

    input {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      border-radius: 10px;
      border: none;
      margin: 10px 0;
      text-align: center;
      box-sizing: border-box;
    }

    button {
      padding: 12px 20px;
      margin: 10px;
      font-size: 15px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
    }

    .download {
      background: #9e9157;
      color: #fff;
    }

    .clear {
      background: #333;
      color: #fff;
    }

    canvas {
      width: 100%;
      margin-top: 15px;
      border-radius: 12px;
      display: block;
    }
  </style>
</head>
<body>

  <div class="container">
    <h2 id="title"></h2>

    <input type="text" id="nameInput" placeholder="اكتب اسمك هنا">

    <div>
      <button class="clear" onclick="clearName()">مسح</button>
      <button class="download" onclick="downloadImage()">تحميل الصورة</button>
    </div>

    <canvas id="canvas"></canvas>
  </div>

  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    const params = new URLSearchParams(window.location.search);
    const type = params.get("type") || "main";

    let config = {
      image: "invite-main.jpg",
      title: "دعوة لحفل معين",
      box: { x: 0.18, y: 0.40, width: 0.64, height: 0.07 }
    };

    if (type === "women-health-graduates") {
      config = {
        image: "invite-women.jpg",
        title: "دعوة خريجات الكادر الصحي للنساء",
        box: { x: 0.20, y: 0.40, width: 0.60, height: 0.08 }
      };
    } else if (type === "men-health-graduates") {
      config = {
        image: "invite-men-graduates.jpg",
        title: "دعوة خريجي الكادر الصحي رجال",
        box: { x: 0.18, y: 0.40, width: 0.64, height: 0.07 }
      };
    } else if (type === "men-health-retirees") {
      config = {
        image: "invite-men-retirees.jpg",
        title: "دعوة متقاعدي الكادر الصحي رجال",
        box: { x: 0.18, y: 0.40, width: 0.64, height: 0.07 }
      };
    }

    document.getElementById("title").innerText = config.title;
    document.title = config.title;

    const img = new Image();
    img.src = config.image;

    img.onload = function () {
      canvas.width = img.width;
      canvas.height = img.height;
      draw();
    };

    document.getElementById("nameInput").addEventListener("input", draw);

    function fitText(text, maxWidth) {
      let size = 80;
      do {
        ctx.font = size + "px Noor";
        size--;
      } while (ctx.measureText(text).width > maxWidth && size > 20);
      return size;
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(img, 0, 0);

      const name = document.getElementById("nameInput").value.trim();
      if (!name) return;

      const box = {
        x: canvas.width * config.box.x,
        y: canvas.height * config.box.y,
        width: canvas.width * config.box.width,
        height: canvas.height * config.box.height
      };

      const fontSize = fitText(name, box.width * 0.9);

      ctx.fillStyle = "#9e9157";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.font = fontSize + "px Noor";

      const textX = box.x + box.width / 2;
      const textY = box.y + box.height / 2;

      ctx.fillText(name, textX, textY);
    }

    function downloadImage() {
      const link = document.createElement("a");
      link.download = "invitation.png";
      link.href = canvas.toDataURL("image/png");
      link.click();
    }

    function clearName() {
      document.getElementById("nameInput").value = "";
      draw();
    }
  </script>

</body>
</html>
